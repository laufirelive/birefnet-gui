# .github/workflows/build.yml
name: Build Portable Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BiRefNet-GUI-Windows
            torch-extra: --index-url https://download.pytorch.org/whl/cu121
          - os: macos-latest
            artifact: BiRefNet-GUI-macOS-ARM
            torch-extra: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch
        run: |
          pip install torch torchvision ${{ matrix.torch-extra }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller birefnet-gui.spec

      - name: Create empty models directory
        shell: bash
        run: mkdir -p dist/BiRefNet-GUI/models

      - name: Create README.txt
        shell: bash
        run: |
          cat > dist/BiRefNet-GUI/README.txt << 'ENDOFREADME'
          BiRefNet Video Matting Tool

          使用前请确保已安装 FFmpeg:
            - Windows: winget install ffmpeg
            - macOS:   brew install ffmpeg

          首次使用:
            1. 运行 BiRefNet-GUI
            2. 在"模型管理"标签页下载至少一个模型
            3. 选择视频/图片文件开始抠图

          模型文件保存在 models/ 目录中。
          ENDOFREADME

      - name: Package as zip (split if >1.9GB)
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            # Use 7z split volumes: each part <1.9GB to stay under GitHub 2GB limit
            7z a -tzip -v1900m "../${{ matrix.artifact }}.zip" BiRefNet-GUI/
          else
            zip -r "../${{ matrix.artifact }}.zip" BiRefNet-GUI/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip*

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip*
